version: '3.8'

services:
  neo4j:
    image: neo4j:5.14-community
    container_name: knowledge-graph-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:15
    container_name: knowledge-graph-postgres
    environment:
      POSTGRES_DB: knowledge_graph_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: knowledge-graph-api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      DATABASE_URL: postgresql://postgres:password@postgres:5432/knowledge_graph_audit
      SECRET_KEY: your-secret-key-change-this-in-production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - postgres
    volumes:
      - .:/app

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
